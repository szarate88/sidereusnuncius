<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidereus Nuncius — Mission Control 🌌</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg-space: #0b0f19;       
            --bg-card: #131c2e;        
            --text-light: #f1f5f9;     
            --text-dim: #94a3b8;       
            --starlight: #38bdf8;      
            --gold-sun: #f59e0b;       
            --border-glow: #1e293b;
            --success: #10b981;
            --danger: #ef4444;
            --highlight: rgba(56, 189, 248, 0.12);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-space);
            background-image: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 0);
            background-size: 32px 32px;
            color: var(--text-light);
            margin: 0;
            padding: 24px;
        }

        .container { max-width: 1500px; margin: 0 auto; }

        header {
            background-color: var(--bg-card);
            padding: 24px 32px;
            border-radius: 14px;
            margin-bottom: 24px;
            border: 1px solid var(--border-glow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: 0.05em; color: var(--text-light); }
        header h1 span { color: var(--starlight); }
        header p { margin: 4px 0 0 0; color: var(--text-dim); font-size: 13px; font-family: monospace; }

        .search-box input {
            background-color: var(--bg-space);
            border: 1px solid var(--border-glow);
            color: var(--text-light);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            width: 320px;
            outline: none;
        }
        .search-box input:focus { border-color: var(--starlight); }

        .layout-grid { display: grid; grid-template-columns: 1fr 420px; gap: 24px; }

        .card {
            background-color: var(--bg-card);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid var(--border-glow);
        }

        .card h2 {
            margin-top: 0;
            font-size: 14px;
            color: var(--gold-sun);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid var(--border-glow);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        /* Tabla de Actividades */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        th { padding: 14px; background-color: #090d16; color: var(--starlight); border-bottom: 2px solid var(--border-glow); text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        td { padding: 14px; border-bottom: 1px solid var(--border-glow); color: var(--text-light); line-height: 1.5; vertical-align: middle; }
        tr:hover { background-color: rgba(56, 189, 248, 0.03); }

        /* Badges de Estado */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .badge-high { background-color: rgba(239, 68, 68, 0.15); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .badge-medium { background-color: rgba(245, 158, 11, 0.15); color: var(--gold-sun); border: 1px solid rgba(245, 158, 11, 0.3); }
        .badge-active { background-color: rgba(56, 189, 248, 0.15); color: var(--starlight); border: 1px solid rgba(56, 189, 248, 0.3); }
        .badge-completed { background-color: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.3); }

        /* Indicadores Numéricos */
        .date-label { font-size: 11px; font-family: monospace; color: var(--starlight); margin-bottom: 12px; background: rgba(56, 189, 248, 0.05); padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .tabs { display: flex; gap: 4px; margin-bottom: 16px; border-bottom: 1px solid var(--border-glow); padding-bottom: 8px; }
        .tab-btn { background: var(--bg-space); border: 1px solid var(--border-glow); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
        .tab-btn.active { background: var(--gold-sun); color: var(--bg-space); border-color: var(--gold-sun); font-weight: 600; }
        
        .week-content { display: none; }
        .week-content.active { display: block; }

        .member-metrics-row {
            display: grid;
            grid-template-columns: 140px 1fr 1fr;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 8px;
            background: var(--bg-space);
            margin-bottom: 8px;
            border: 1px solid var(--border-glow);
        }
        .member-name-tag { font-size: 14px; font-weight: 600; color: var(--text-light); }
        
        .metric-counter {
            font-size: 11px;
            font-family: monospace;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
            font-weight: 700;
        }
        .metric-counter.active-tasks { background: rgba(56, 189, 248, 0.08); color: var(--starlight); border: 1px solid rgba(56, 189, 248, 0.2); }
        .metric-counter.completed-tasks { background: rgba(16, 185, 129, 0.08); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .inactive-member { opacity: 0.5; border-style: dashed; }

        .export-btn {
            width: 100%;
            background-color: rgba(56, 189, 248, 0.08);
            border: 1px solid var(--starlight);
            color: var(--starlight);
            padding: 12px;
            border-radius: 8px;
            font-size: 12.5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .export-btn:hover {
            background-color: var(--starlight);
            color: var(--bg-space);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>SIDEREUS NUNCIUS <span>• MISSION CONTROL 🌌</span></h1>
            <p>Ecosistema de Monitoreo de Actividades y Comunes de Conocimiento</p>
        </div>
        <div class="search-box">
            <input type="text" id="taskSearch" onkeyup="filterTasks()" placeholder="Filtrar por actividad o responsable...">
        </div>
    </header>

    <div class="layout-grid">
        <div class="main-pane">
            <div class="card">
                <h2>Cronograma de Actividades Críticas</h2>
                <div class="table-wrapper" id="activities-table-target">
                    <p style="color: var(--text-dim);">Conectando con la base de datos estelar...</p>
                </div>
            </div>
        </div>

        <div class="sidebar-pane">
            <div class="card">
                <h2>Carga de Trabajo & Contribuciones</h2>
                <!-- El rango de fechas de abajo ahora se calcula y actualiza solo -->
                <div id="dynamic-date-label" class="date-label">Calculando ciclo estelar...</div>
                
                <div class="tabs">
                    <button class="tab-btn active" id="tab-curr" onclick="toggleWeekView('current')">Semana Actual</button>
                    <button class="tab-btn" id="tab-prev" onclick="toggleWeekView('previous')">Semana Anterior</button>
                </div>

                <div id="panel-current" class="week-content active">
                    <div id="current-metrics-list"></div>
                </div>

                <div id="panel-previous" class="week-content">
                    <div id="previous-metrics-list"></div>
                </div>

                <button class="export-btn" onclick="exportContributionReport()">
                    📥 Exportar Reporte de Contribuciones (CSV)
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    const teamList = ["Sebastian", "Fernando", "Jose", "Josue", "Luis", "Esteban", "Juan Diego"];
    let globalMetrics = {};

    // ESTRUCTURA DE CÓMPUTO CRONOLÓGICO AUTOMÁTICO
    function initDynamicDates() {
        const today = new Date();
        const currentDay = today.getDay(); 
        
        // Ajustamos los desfases para mapear de lunes (1) a domingo (7)
        const distanceToMonday = currentDay === 0 ? -6 : 1 - currentDay;
        
        const monday = new Date(today);
        monday.setDate(today.getDate() + distanceToMonday);
        
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        
        const options = { day: '2-digit', month: 'short' };
        const labelText = `Ciclo Actual: ${monday.toLocaleDateString('es-ES', options)} - ${sunday.toLocaleDateString('es-ES', options)} ${sunday.getFullYear()}`;
        document.getElementById('dynamic-date-label').innerText = labelText;
        
        return { monday: monday, sunday: sunday };
    }

    function processCSVMetrics(data) {
        const dateRange = initDynamicDates();
        
        // El umbral de inicio de la semana previa son exactamente 7 días antes de este lunes
        const prevMonday = new Date(dateRange.monday);
        prevMonday.setDate(dateRange.monday.getDate() - 7);
        const prevSunday = new Date(dateRange.monday);
        prevSunday.setDate(dateRange.monday.getDate() - 1);

        teamList.forEach(member => {
            globalMetrics[member] = { active: 0, completed: 0, completedPrevious: 0 };
        });

        data.forEach(row => {
            const resp = row.Responsible ? row.Responsible.trim() : "";
            const status = row.Status ? row.Status.trim().toLowerCase() : "";
            const deadlineStr = row.Deadline ? row.Deadline.trim() : "";
            
            if (globalMetrics[resp]) {
                const isComp = (status === "completed" || status === "completado" || status === "finalizado");
                const isActive = (status === "active" || status === "en progreso" || status === "in progress");
                
                if (isComp) {
                    globalMetrics[resp].completed += 1;
                    
                    // Si tiene fecha asignada, evaluamos si pertenece formalmente a la semana previa
                    if (deadlineStr) {
                        const deadlineDate = new Date(deadlineStr + "T00:00:00");
                        if (deadlineDate >= prevMonday && deadlineDate <= prevSunday) {
                            globalMetrics[resp].completedPrevious += 1;
                        }
                    }
                } else if (isActive) {
                    globalMetrics[resp].active += 1;
                }
            }
        });

        renderMetricsDashboard();
    }

    function renderMetricsDashboard() {
        let currentHTML = "";
        let previousHTML = "";

        teamList.forEach(member => {
            const activeCount = globalMetrics[member].active;
            const completedCount = globalMetrics[member].completed;
            const prevClosedCount = globalMetrics[member].completedPrevious;
            
            const isInactiveCurrent = (activeCount === 0 && completedCount === 0);
            const isInactivePrevious = (prevClosedCount === 0);

            // Fila de la Semana Actual
            currentHTML += `
                <div class="member-metrics-row ${isInactiveCurrent ? 'inactive-member' : ''}">
                    <div class="member-name-tag">${member}</div>
                    <div class="metric-counter active-tasks">${activeCount} Activas</div>
                    <div class="metric-counter completed-tasks">${completedCount} Logradas</div>
                </div>`;
            
            // Fila de la Semana Anterior Leyendo Datos Reales
            previousHTML += `
                <div class="member-metrics-row ${isInactivePrevious ? 'inactive-member' : ''}">
                    <div class="member-name-tag">${member}</div>
                    <div class="metric-counter active-tasks" style="opacity:0.5;">-- Terminado</div>
                    <div class="metric-counter completed-tasks">${prevClosedCount} Cerradas</div>
                </div>`;
        });

        document.getElementById('current-metrics-list').innerHTML = currentHTML;
        document.getElementById('previous-metrics-list').innerHTML = previousHTML;
    }

    function toggleWeekView(week) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.week-content').forEach(c => c.classList.remove('active'));

        if (week === 'current') {
            document.getElementById('tab-curr').classList.add('active');
            document.getElementById('panel-current').classList.add('active');
        } else {
            document.getElementById('tab-prev').classList.add('active');
            document.getElementById('panel-previous').classList.add('active');
        }
    }

    function exportContributionReport() {
        let csvContent = "data:text/csv;charset=utf-8,";
        csvContent += "Miembro,Actividades Activas,Actividades Completadas,Cerradas Semana Anterior,Nivel de Contribucion\n";

        teamList.forEach(member => {
            const act = globalMetrics[member].active;
            const comp = globalMetrics[member].completed;
            const prev = globalMetrics[member].completedPrevious;
            let level = "Estable";
            if (comp > 2 || prev > 1) level = "Alto Impacto";
            if (act === 0 && comp === 0) level = "Inactivo";

            csvContent += `"${member}",${act},${comp},${prev},"${level}"\n`;
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Reporte_Contribuciones_Sidereus_2026.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function buildTableHTML(data) {
        if (!data || data.length === 0) return '<p style="color: var(--text-dim);">Sin actividades registradas.</p>';

        let html = '<table><thead><tr>';
        const headers = Object.keys(data[0]).filter(h => h.trim() !== "");
        
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody id="searchable-rows">';

        data.forEach(row => {
            if (Object.values(row).some(v => v && v.trim() !== "")) {
                html += '<tr>';
                headers.forEach(h => {
                    let val = row[h] ? row[h].trim() : '';
                    
                    if (h.toLowerCase() === 'priority') {
                        let cls = val.toLowerCase() === 'high' ? 'badge-high' : 'badge-medium';
                        html += `<td><span class="badge ${cls}">${val}</span></td>`;
                    } else if (h.toLowerCase() === 'status') {
                        let isComp = (val.toLowerCase() === 'completed' || val.toLowerCase() === 'completado');
                        let cls = isComp ? 'badge-completed' : 'badge-active';
                        html += `<td><span class="badge ${cls}">${val}</span></td>`;
                    } else {
                        html += `<td>${val}</td>`;
                    }
                });
                html += '</tr>';
            }
        });
        html += '</tbody></table>';
        return html;
    }

    function filterTasks() {
        let val = document.getElementById("taskSearch").value.toLowerCase();
        let rows = document.querySelectorAll("#searchable-rows tr");
        rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(val) ? "" : "none");
    }

    const githubUser = "szarate88"; 
    const csvSource = `https://raw.githubusercontent.com/${githubUser}/sidereus-dashboard/main/data/tasks.csv`;

    Papa.parse(csvSource, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) { 
            document.getElementById('activities-table-target').innerHTML = buildTableHTML(r.data);
            processCSVMetrics(r.data); 
        },
        error: function() {
            Papa.parse("data/tasks.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(r) { 
                    document.getElementById('activities-table-target').innerHTML = buildTableHTML(r.data); 
                    processCSVMetrics(r.data);
                }
            });
        }
    });
</script>

</body>
</html>
